<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 210 297" width="210mm" height="297mm">
  <defs>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8920D"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8920D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="210" height="297" fill="#FFFFFF"/>

  <!-- ============ HEADER AREA ============ -->

  <!-- Top accent bar -->
  <rect x="0" y="0" width="210" height="1.2" fill="url(#accentLine)"/>

  <!-- Logo -->
  <image href="sample-1/images/Timeless_Logo.png" x="12" y="6" width="48" height="20"/>

  <!-- Company name - right aligned -->
  <text x="198" y="14" font-family="Georgia, 'Times New Roman', serif" font-size="5.5" fill="#0A192F" text-anchor="end" font-weight="bold" letter-spacing="0.4">TIMELESS RELOCATION</text>
  <text x="198" y="19" font-family="Arial, Helvetica, sans-serif" font-size="2.6" fill="#64748B" text-anchor="end" letter-spacing="0.3">PROFESSIONAL MOVERS &amp; PACKERS</text>

  <!-- Contact details - right aligned -->
  <text x="198" y="23.5" font-family="Arial, Helvetica, sans-serif" font-size="2.2" fill="#334155" text-anchor="end">
    <tspan fill="#E8920D" font-weight="bold">Tel: </tspan>+971 56 865 4794
  </text>
  <text x="198" y="27" font-family="Arial, Helvetica, sans-serif" font-size="2.2" fill="#334155" text-anchor="end">
    <tspan fill="#E8920D" font-weight="bold">Email: </tspan>info@timelessrelocation.com
  </text>
  <text x="198" y="30.5" font-family="Arial, Helvetica, sans-serif" font-size="2.2" fill="#334155" text-anchor="end">
    <tspan fill="#E8920D" font-weight="bold">Address: </tspan>Bur Dubai, Dubai, UAE
  </text>

  <!-- Divider lines -->
  <line x1="12" y1="34" x2="198" y2="34" stroke="url(#accentLine)" stroke-width="0.4"/>
  <line x1="12" y1="35" x2="198" y2="35" stroke="#0A192F" stroke-width="0.1" opacity="0.2"/>

  <!-- ============ CONTENT AREA ============ -->

  <!-- ===== CORNER: Bottom-Left - Moving Truck ===== -->
  <g transform="translate(5, 255)" opacity="0.06">
    <!-- Truck body -->
    <rect x="0" y="4" width="28" height="18" rx="1" fill="#0A192F"/>
    <rect x="0.5" y="5" width="27" height="11" rx="0.5" fill="#0A192F"/>
    <!-- Cab -->
    <polygon points="28,4 38,4 43,11 43,22 28,22" fill="#0A192F"/>
    <rect x="30" y="7" width="11" height="8" rx="0.5" fill="#FFFFFF" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="8" cy="24" r="3" fill="#0A192F"/>
    <circle cx="22" cy="24" r="3" fill="#0A192F"/>
    <circle cx="38" cy="24" r="3" fill="#0A192F"/>
    <circle cx="8" cy="24" r="1.2" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="22" cy="24" r="1.2" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="38" cy="24" r="1.2" fill="#FFFFFF" opacity="0.2"/>
    <!-- Ground line -->
    <line x1="-2" y1="27" x2="48" y2="27" stroke="#0A192F" stroke-width="0.3"/>
  </g>

  <!-- ===== CORNER: Bottom-Right - Loaders/Workers ===== -->
  <g transform="translate(170, 253)" opacity="0.06">
    <!-- Worker 1 carrying box -->
    <!-- Head -->
    <circle cx="10" cy="3" r="2.2" fill="#0A192F"/>
    <!-- Body -->
    <line x1="10" y1="5.2" x2="10" y2="14" stroke="#0A192F" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Arms holding box -->
    <line x1="10" y1="8" x2="5" y2="10" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="8" x2="15" y2="10" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <!-- Box -->
    <rect x="4" y="9" width="12" height="8" rx="0.5" fill="none" stroke="#0A192F" stroke-width="0.8"/>
    <line x1="10" y1="9" x2="10" y2="17" stroke="#0A192F" stroke-width="0.4"/>
    <line x1="4" y1="13" x2="16" y2="13" stroke="#0A192F" stroke-width="0.4"/>
    <!-- Legs -->
    <line x1="10" y1="14" x2="7" y2="21" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="14" x2="13" y2="21" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>

    <!-- Worker 2 with dolly -->
    <!-- Head -->
    <circle cx="30" cy="3" r="2.2" fill="#0A192F"/>
    <!-- Body -->
    <line x1="30" y1="5.2" x2="30" y2="14" stroke="#0A192F" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Arms pushing dolly -->
    <line x1="30" y1="8" x2="24" y2="11" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <line x1="30" y1="9" x2="24" y2="12" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <!-- Dolly -->
    <line x1="23" y1="8" x2="23" y2="20" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <line x1="23" y1="8" x2="20" y2="12" stroke="#0A192F" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="23" cy="21.5" r="1.5" fill="#0A192F"/>
    <!-- Stacked boxes on dolly -->
    <rect x="19" y="8" width="8" height="5" rx="0.3" fill="none" stroke="#0A192F" stroke-width="0.6"/>
    <rect x="19.5" y="4" width="7" height="4.5" rx="0.3" fill="none" stroke="#0A192F" stroke-width="0.6"/>
    <!-- Legs -->
    <line x1="30" y1="14" x2="27" y2="21" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
    <line x1="30" y1="14" x2="33" y2="21" stroke="#0A192F" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ===== CORNER: Top-Left below header - Clock/Logo mark ===== -->
  <g transform="translate(12, 38)" opacity="0.04">
    <!-- Clock circle (from logo) -->
    <circle cx="12" cy="12" r="10" fill="none" stroke="#E8920D" stroke-width="1.5"/>
    <!-- Clock hands -->
    <line x1="12" y1="12" x2="12" y2="5" stroke="#0A192F" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="17" y2="15" stroke="#0A192F" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="12" cy="12" r="1" fill="#0A192F"/>
    <!-- Hour marks -->
    <circle cx="12" cy="3" r="0.5" fill="#0A192F"/>
    <circle cx="21" cy="12" r="0.5" fill="#0A192F"/>
    <circle cx="12" cy="21" r="0.5" fill="#0A192F"/>
    <circle cx="3" cy="12" r="0.5" fill="#0A192F"/>
  </g>

  <!-- ===== Center watermark - subtle logo text ===== -->
  <g opacity="0.02">
    <text x="105" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#0A192F" text-anchor="middle" font-weight="bold" letter-spacing="2">TIMELESS</text>
    <text x="105" y="163" font-family="Arial, Helvetica, sans-serif" font-size="5" fill="#0A192F" text-anchor="middle" letter-spacing="4">RELOCATION</text>
  </g>

  <!-- ============ FOOTER AREA ============ -->

  <!-- Footer divider -->
  <line x1="12" y1="275" x2="198" y2="275" stroke="#0A192F" stroke-width="0.1" opacity="0.2"/>
  <line x1="12" y1="275.8" x2="198" y2="275.8" stroke="url(#accentLine)" stroke-width="0.3"/>

  <!-- Owner info - left -->
  <text x="12" y="281" font-family="Georgia, 'Times New Roman', serif" font-size="2.8" fill="#0A192F" font-weight="bold">Bilal Talib</text>
  <text x="12" y="284.5" font-family="Arial, Helvetica, sans-serif" font-size="2" fill="#64748B">Owner &amp; Managing Director</text>

  <!-- Footer contact - center -->
  <text x="105" y="281" font-family="Arial, Helvetica, sans-serif" font-size="2" fill="#334155" text-anchor="middle">
    <tspan fill="#E8920D">&#9742;</tspan> +971 56 865 4794
    <tspan dx="4" fill="#E8920D">&#9993;</tspan> info@timelessrelocation.com
  </text>
  <text x="105" y="284.5" font-family="Arial, Helvetica, sans-serif" font-size="2" fill="#334155" text-anchor="middle">
    <tspan fill="#E8920D">&#9672;</tspan> Bur Dubai, Dubai, United Arab Emirates
  </text>

  <!-- Website - right -->
  <text x="198" y="281" font-family="Arial, Helvetica, sans-serif" font-size="2" fill="#64748B" text-anchor="end">www.timelessrelocation.com</text>
  <text x="198" y="284.5" font-family="Arial, Helvetica, sans-serif" font-size="1.8" fill="#E8920D" text-anchor="end" font-style="italic">Your Trusted Moving Partner</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="295.8" width="210" height="1.2" fill="url(#accentLine)"/>

</svg>
