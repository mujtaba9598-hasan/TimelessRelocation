  <text x="410" y="620" font-size="7" font-weight="600" fill="#0f2b46">Tagline:</text>
  <text x="410" y="633" font-size="7.5" font-weight="400" fill="#d4943a" font-style="italic">"The way to move.</text>
  <text x="410" y="646" font-size="7.5" font-weight="400" fill="#d4943a" font-style="italic"> The way to care."</text>

  <text x="410" y="666" font-size="7" font-weight="600" fill="#0f2b46">Tone:</text>
  <text x="410" y="679" font-size="7" font-weight="400" fill="#6b7280">Professional, trustworthy, warm</text>

  <text x="410" y="696" font-size="7" font-weight="600" fill="#0f2b46">Keywords:</text>
  <text x="410" y="709" font-size="7" font-weight="400" fill="#6b7280">Timeless, Relocation, Professional</text>

