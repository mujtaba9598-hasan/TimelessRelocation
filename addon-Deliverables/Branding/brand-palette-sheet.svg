  <text x="55" y="786" font-size="8.5" font-weight="400" fill="#4b5563">+971 56 865 4794</text>

  <!-- Email -->
  <rect x="218" y="752" width="160" height="45" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="233" y="770" font-size="8" font-weight="700" fill="#0f2b46" letter-spacing="0.5">EMAIL</text>
  <text x="233" y="786" font-size="8.5" font-weight="400" fill="#4b5563">info@timelessrelocation.com</text>

