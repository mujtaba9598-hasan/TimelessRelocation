<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="210mm" height="297mm" style="display:block;margin:auto">
  <defs>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4943a"/>
      <stop offset="50%" stop-color="#e8b36a"/>
      <stop offset="100%" stop-color="#d4943a"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900');
      text { font-family: 'Outfit', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="595" height="842" fill="#ffffff"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="595" height="22" fill="url(#goldBar)"/>

  <!-- ===== HEADER ===== -->
  <!-- Logo -->
  <image href="../sample-2/Timeless_Logo.png" x="25" y="28" width="55" height="40" preserveAspectRatio="xMidYMid meet"/>

  <text x="297" y="48" text-anchor="middle" font-size="22" font-weight="800" fill="#0f2b46" letter-spacing="-0.3">Brand Guidelines</text>
  <text x="297" y="64" text-anchor="middle" font-size="10" font-weight="400" fill="#6b7280">Timeless Relocation — Visual Identity System</text>

  <!-- Divider -->
  <line x1="40" y1="80" x2="555" y2="80" stroke="#e5e7eb" stroke-width="1.5"/>

