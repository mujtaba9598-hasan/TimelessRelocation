  <text x="40" y="178" font-size="7" font-weight="400" fill="#6b7280">#0F2B46</text>

  <!-- Navy Light -->
  <rect x="145" y="115" width="95" height="40" rx="6" fill="#173a5c"/>
  <text x="145" y="168" font-size="8.5" font-weight="600" fill="#0f2b46">Navy Light</text>
  <text x="145" y="178" font-size="7" font-weight="400" fill="#6b7280">#173A5C</text>

  <!-- Gold -->
  <rect x="250" y="115" width="95" height="40" rx="6" fill="#d4943a"/>
  <text x="250" y="168" font-size="8.5" font-weight="600" fill="#0f2b46">Gold</text>
  <text x="250" y="178" font-size="7" font-weight="400" fill="#6b7280">#D4943A</text>

