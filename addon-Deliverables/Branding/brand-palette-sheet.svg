  <rect x="395" y="752" width="160" height="45" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="410" y="770" font-size="8" font-weight="700" fill="#0f2b46" letter-spacing="0.5">LOCATION</text>
