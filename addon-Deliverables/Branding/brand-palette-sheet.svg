  <text x="55" y="400" font-size="6" font-weight="400" fill="#9ca3af" letter-spacing="0.5">EXTRABOLD 800</text>
  <text x="120" y="400" font-size="9" font-weight="800" fill="#0f2b46">The way to move. The way to care.</text>

