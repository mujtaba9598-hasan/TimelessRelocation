<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Timeless Relocation</title>
  <meta name="description" content="The page you are looking for could not be found. Return to Timeless Relocation homepage for movers and packers in Dubai, UAE.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      margin-bottom: 16px;
      color: var(--text-dark);
    }
    .error-desc {
      max-width: 480px;
      margin: 0 auto 32px;
      color: var(--text-medium);
      font-size: 1.05rem;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main role="main">
    <section class="error-page">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">Sorry, the page you are looking for does not exist or has been moved. Let us help you find your way back.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Back to Homepage</a>
        <a href="contact.html" class="btn btn-outline">Contact Us</a>
      </div>
    </section>
  </main>
</body>
</html>
